name: Build and Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write # 給寫入權限，才能把改好的檔案推回 GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Inject Supabase Keys into Config JS
      env:
        MY_URL: ${{ vars.SUPABASE_URL }}
        MY_KEY: ${{ vars.SUPABASE_ANON_KEY }}
      run: |
        find . -name "supabase-config.js" -exec sed -i "s#__SUPABASE_URL__#$MY_URL#g" {} +
        find . -name "supabase-config.js" -exec sed -i "s#__SUPABASE_ANON_KEY__#$MY_KEY#g" {} +

    # 自動開一個 gh-pages 分支並把檔案丟上去
    - name: Deploy to GitHub Pages Branch
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: .
        branch: gh-pages
