name: Build and Deploy

on:
  push: # 🌟 不管什麼分支，只要有 push 就強制執行

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Inject Supabase Keys into Config JS
      env:
        MY_URL: ${{ vars.SUPABASE_URL }}
        MY_KEY: ${{ vars.SUPABASE_ANON_KEY }}
      run: |
        find . -name "supabase-config.js" -exec sed -i "s#__SUPABASE_URL__#$MY_URL#g" {} +
        find . -name "supabase-config.js" -exec sed -i "s#__SUPABASE_ANON_KEY__#$MY_KEY#g" {} +
        
        echo "=== 驗證虛擬機內檔案已修改 ==="
        head -n 5 ./supabase-config.js

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
